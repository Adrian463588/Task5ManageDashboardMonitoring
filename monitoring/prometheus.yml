global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  # Scrape node-exporter from the dedicated target VM
  - job_name: 'target-node'
    static_configs:
      - targets: ['TARGET_VM_IP:9100']
        labels:
          instance: 'target-vm'