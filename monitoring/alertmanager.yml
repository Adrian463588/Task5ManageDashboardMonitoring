route:
  receiver: discord
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 1h

receivers:
- name: discord
  discord_configs:
  - webhook_url: 'DISCORD_WEBHOOK_PLACEHOLDER'
    title: '[{{ .Status | toUpper }}] Prometheus Alert'
    message: |-
      {{ range .Alerts }}
      **Alert:** {{ .Annotations.summary }}
      **Details:** {{ .Annotations.description }}
      **Severity:** {{ .Labels.severity }}
      {{ end }}